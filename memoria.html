    let lang = localStorage.getItem("bestHomesLang") || "cat";

    function setLang(next) {
      lang = next;
      localStorage.setItem("bestHomesLang", lang);
      document.documentElement.lang = lang === "cat" ? "ca" : lang;
      const d = DATA[lang];
      document.querySelectorAll("[data-i18n]").forEach((el) => el.textContent = d[el.dataset.i18n] || "");
      document.querySelectorAll("[data-i18n-html]").forEach((el) => el.innerHTML = d[el.dataset.i18nHtml] || "");
      renderLangButtons();
      renderSurfaces();
      renderSections();
    }

    function renderLangButtons() {
      document.getElementById("langSwitch").innerHTML = ["cat","es","en"].map((l) => `
        <button class="lang-btn ${l === lang ? "is-active" : ""}" data-lang="${l}">${l.toUpperCase()}</button>
      `).join("");
      document.querySelectorAll("[data-lang]").forEach((btn) => btn.addEventListener("click", () => setLang(btn.dataset.lang)));
    }

    function renderSurfaces() {
      document.getElementById("surfaceGrid").innerHTML = DATA[lang].surfaces.map(([label, value, type]) => `
        <article class="surface ${type || ""}">
          <span>${label}</span>
          <strong>${value}</strong>
        </article>
      `).join("");
    }

    function renderSections() {
      const sections = DATA[lang].sections;
      document.getElementById("toc").innerHTML = sections.map(([title], i) => `
        <a href="#s${i + 1}">${String(i + 1).padStart(2, "0")} · ${title}</a>
      `).join("");
      document.getElementById("sections").innerHTML = sections.map(([title, items], i) => `
        <section class="spec-section reveal" id="s${i + 1}">
          <div class="section-title">
            <span>${String(i + 1).padStart(2, "0")}</span>
            <h2>${title}</h2>
          </div>
          <ul class="spec-list">
            ${items.map(([key, value]) => `
              <li class="spec-item">
                <span class="spec-key">${key}</span>
                <span class="spec-val">${value}</span>
              </li>
            `).join("")}
          </ul>
        </section>
      `).join("");
      observeReveals();
    }

    let observer;
    function observeReveals() {
      if (observer) observer.disconnect();
      observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) entry.target.classList.add("is-visible");
        });
      }, { threshold: .12 });
      document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
    }

    setLang(lang);
    observeReveals();
